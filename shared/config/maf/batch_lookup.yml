version: 1
dialect: mssql
# Placeholders: {{WINDOW_SEC}} {{CLIENT_ID}} {{DATE}} {{CARTERAS_LIST}}
tail_sql: |
  ;WITH T1 AS (
    SELECT
      t.k,
      dp.cDocParam107                                   AS N_CUOTA,
      dc.cDoc_Numero                                    AS CONCATENADO,
      CONVERT(varchar(10), dc.dDoc_FecVenc, 23)          AS FEC_VENCIMIENTO,
      dc.nId_Moneda                                      AS MONEDA,
      TRY_CONVERT(float, dp.cDocParam105)                AS MONTO_CUOTA,
      dp.cDocParam140                                    AS ULTIMO_TRAMO,
      dp.cDocParam193                                    AS CATEGORIA,
      dp.cDocParam47                                     AS PLACA,
      CONVERT(varchar(19), op.dFechCompromisoPago, 120)  AS FEC_COMP,
      TRY_CONVERT(float, op.monto_comp)                  AS MONTO_COMP_SOLES,
      TRY_CONVERT(float, op.monto_compDolares)           AS MONTO_COMP_DOLARES,
      ou.cNombre_OpeCodCliOut                            AS NOMBRE_RPTA,
      op.cDocOpeCobOut_Descr                             AS OBSERVACION,
      dp.cDocParam23                                     AS DOCUMENTO,
      op.nId_OpeCodOut                                   AS NID_OPECODOUT,
      dp.cDocParam21                                     AS DEUDOR
    FROM #temporal t
    JOIN av_docxcobrarope op WITH (READUNCOMMITTED)
         ON t.tipo = 1
        AND t.id_agente = op.nId_UsuOpe
        AND t.telefono  = op.nTelef_Nro
        AND op.dDocCobOpe_FecIni BETWEEN DATEADD(SECOND, -{{WINDOW_SEC}}, t.fecha_gestion)
                                    AND DATEADD(SECOND,  {{WINDOW_SEC}}, t.fecha_gestion)
        AND op.nId_Cliente = {{CLIENT_ID}}
        AND CONVERT(date, op.dDocCobOpe_FecIni) = '{{DATE}}'
        AND op.nid_cartera IN ({{CARTERAS_LIST}})
    JOIN av_docxcobrar dc      WITH (READUNCOMMITTED) ON dc.nId_DocxCobrar = op.nId_DocxCobrar
    JOIN av_docxcobrarParam dp WITH (READUNCOMMITTED) ON dp.nId_DocxCobrar = dc.nId_DocxCobrar
    JOIN av_OpeCodCliOut ou    WITH (READUNCOMMITTED) ON ou.nId_OpeCodCliOut = op.nId_OpeCodOut
  ),
  T2 AS (
    SELECT
      t.k,
      dp.cDocParam107                                   AS N_CUOTA,
      dc.cDoc_Numero                                    AS CONCATENADO,
      CONVERT(varchar(10), dc.dDoc_FecVenc, 23)          AS FEC_VENCIMIENTO,
      dc.nId_Moneda                                      AS MONEDA,
      TRY_CONVERT(float, dp.cDocParam105)                AS MONTO_CUOTA,
      dp.cDocParam140                                    AS ULTIMO_TRAMO,
      dp.cDocParam193                                    AS CATEGORIA,
      dp.cDocParam47                                     AS PLACA,
      CONVERT(varchar(19), op.dFechCompromisoPago, 120)  AS FEC_COMP,
      TRY_CONVERT(float, op.monto_comp)                  AS MONTO_COMP_SOLES,
      TRY_CONVERT(float, op.monto_compDolares)           AS MONTO_COMP_DOLARES,
      ou.cNombre_OpeCodCliOut                            AS NOMBRE_RPTA,
      op.cDocOpeCobOut_Descr                             AS OBSERVACION,
      dp.cDocParam23                                     AS DOCUMENTO,
      op.nId_OpeCodOut                                   AS NID_OPECODOUT,
      dp.cDocParam21                                     AS DEUDOR
    FROM #temporal t
    JOIN av_docxcobrarope op WITH (READUNCOMMITTED)
         ON t.tipo = 2
        AND t.id_agente = op.nId_UsuOpe
        AND t.telefono  = op.nTelef_Nro
        AND t.cid_llamada = op.cID_Llamada
        AND op.nId_Cliente = {{CLIENT_ID}}
        AND CONVERT(date, op.dDocCobOpe_FecIni) = '{{DATE}}'
        AND op.nid_cartera IN ({{CARTERAS_LIST}})
    JOIN av_docxcobrar dc      WITH (READUNCOMMITTED) ON dc.nId_DocxCobrar = op.nId_DocxCobrar
    JOIN av_docxcobrarParam dp WITH (READUNCOMMITTED) ON dp.nId_DocxCobrar = dc.nId_DocxCobrar
    JOIN av_OpeCodCliOut ou    WITH (READUNCOMMITTED) ON ou.nId_OpeCodCliOut = op.nId_OpeCodOut
  )
  SELECT
    k,
    N_CUOTA, CONCATENADO, FEC_VENCIMIENTO, MONEDA, MONTO_CUOTA,
    ULTIMO_TRAMO, CATEGORIA, PLACA,
    FEC_COMP, MONTO_COMP_SOLES, MONTO_COMP_DOLARES,
    NOMBRE_RPTA, OBSERVACION, DOCUMENTO, NID_OPECODOUT, DEUDOR
  FROM T1
  UNION ALL
  SELECT
    k,
    N_CUOTA, CONCATENADO, FEC_VENCIMIENTO, MONEDA, MONTO_CUOTA,
    ULTIMO_TRAMO, CATEGORIA, PLACA,
    FEC_COMP, MONTO_COMP_SOLES, MONTO_COMP_DOLARES,
    NOMBRE_RPTA, OBSERVACION, DOCUMENTO, NID_OPECODOUT, DEUDOR
  FROM T2
  ORDER BY k;
